<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Schedule - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-calendar-week"></i> Schedule</h1><p>Horario de disponibilidad (FHIR Schedule)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-location-dot"></i> Recurso/Ubicación</h2>
<div class="grid-2"><div class="form-group full-width"><label>Actor Ref</label><input type="text" id="actorRef" placeholder="Location/1 | Practitioner/example" required></div><div class="form-group full-width"><label>Actor Nombre</label><input type="text" id="actorDisplay" placeholder="Burgers UMC, South Wing"></div></div>
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Detalles</h2>
<div class="grid-2"><div class="form-group"><label>Activo</label><select id="active"><option value="true">Sí</option><option value="false">No</option></select></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="Horario de Inmunizaciones"></div></div>
<div class="form-group full-width"><label>Comentario</label><textarea id="comment" placeholder="The slots attached to this schedule..."></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Schedule</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Schedule",id:"sch_"+Date.now().toString(36),active:document.getElementById('active').value==='true',name:document.getElementById('name').value,actor:[{reference:document.getElementById('actorRef').value,display:document.getElementById('actorDisplay').value}],comment:document.getElementById('comment').value};let db=JSON.parse(localStorage.getItem('fhir_schedules_db'))||[];db.push(fhir);localStorage.setItem('fhir_schedules_db',JSON.stringify(db));console.log("✅ Schedule:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Schedule';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
