<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Transport - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-truck"></i> Transport</h1><p>Transporte de suministros (FHIR Transport)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>Identificador</label><input type="text" id="identifier" placeholder="Transport1234" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="completed">Completado</option><option value="in-progress">En progreso</option><option value="planned">Planificado</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-location-dot"></i> Ubicaciones</h2>
<div class="grid-2"><div class="form-group"><label>Ubicación Solicitada</label><input type="text" id="requestedLocation" placeholder="Transport/location-hospitalLab"></div><div class="form-group"><label>Ubicación Actual</label><input type="text" id="currentLocation" placeholder="Transport/location-labA"></div></div>
<div class="form-group full-width"><label>Basado en</label><input type="text" id="basedOn" placeholder="SupplyRequest/simpleorder"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Transport</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Transport",id:"trans_"+Date.now().toString(36),identifier:[{value:document.getElementById('identifier').value}],status:document.getElementById('status').value,intent:"order",basedOn:[{reference:document.getElementById('basedOn').value}],requestedLocation:{reference:document.getElementById('requestedLocation').value},currentLocation:{reference:document.getElementById('currentLocation').value}};let db=JSON.parse(localStorage.getItem('fhir_transports_db'))||[];db.push(fhir);localStorage.setItem('fhir_transports_db',JSON.stringify(db));console.log("✅ Transport:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Transport';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
