<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Appointment - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-calendar-check"></i> Appointment</h1><p>Cita médica (FHIR Appointment)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-user"></i> Participantes</h2>
<div class="grid-2"><div class="form-group"><label>Paciente Ref</label><input type="text" id="patientRef" placeholder="Patient/example" required></div><div class="form-group"><label>Paciente Nombre</label><input type="text" id="patientName"></div><div class="form-group"><label>Profesional Ref</label><input type="text" id="practitionerRef" placeholder="Practitioner/example"></div><div class="form-group"><label>Profesional Nombre</label><input type="text" id="practitionerName"></div></div>
<h2 class="section-title"><i class="fa-solid fa-clock"></i> Fechas</h2>
<div class="grid-2"><div class="form-group"><label>Inicio</label><input type="datetime-local" id="startDate" required></div><div class="form-group"><label>Fin</label><input type="datetime-local" id="endDate" required></div></div>
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Detalles</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="booked">Agendada</option><option value="fulfilled">Realizada</option><option value="cancelled">Cancelada</option></select></div><div class="form-group"><label>Razón</label><input type="text" id="reason" placeholder="Consulta médica"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Cita</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const participants=[{actor:{reference:document.getElementById('patientRef').value,display:document.getElementById('patientName').value},required:"required",status:"accepted"}];if(document.getElementById('practitionerRef').value){participants.push({actor:{reference:document.getElementById('practitionerRef').value,display:document.getElementById('practitionerName').value},required:"required",status:"accepted"})}const fhir={resourceType:"Appointment",id:"apt_"+Date.now().toString(36),status:document.getElementById('status').value,appointmentType:{text:document.getElementById('reason').value},start:new Date(document.getElementById('startDate').value).toISOString(),end:new Date(document.getElementById('endDate').value).toISOString(),participant:participants};let db=JSON.parse(localStorage.getItem('fhir_appointments_db'))||[];db.push(fhir);localStorage.setItem('fhir_appointments_db',JSON.stringify(db));console.log("✅ Appointment:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Cita';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
