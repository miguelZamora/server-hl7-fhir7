<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Slot - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-clock"></i> Slot</h1><p>Espacio de agenda (FHIR Slot)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-calendar"></i> Horario Padre</h2>
<div class="grid-2"><div class="form-group full-width"><label>Referencia Schedule</label><input type="text" id="scheduleRef" placeholder="Schedule/example" required></div></div>
<h2 class="section-title"><i class="fa-solid fa-clock"></i> Tiempo</h2>
<div class="grid-2"><div class="form-group"><label>Inicio</label><input type="datetime-local" id="startDate" required></div><div class="form-group"><label>Fin</label><input type="datetime-local" id="endDate" required></div></div>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="free">Libre</option><option value="busy">Ocupado</option><option value="busy-unavailable">No disponible</option></select></div><div class="form-group"><label>Comentario</label><input type="text" id="comment" placeholder="Assessments should be performed before..."></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Slot</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Slot",id:"slot_"+Date.now().toString(36),schedule:{reference:document.getElementById('scheduleRef').value},status:document.getElementById('status').value,start:new Date(document.getElementById('startDate').value).toISOString(),end:new Date(document.getElementById('endDate').value).toISOString(),comment:document.getElementById('comment').value};let db=JSON.parse(localStorage.getItem('fhir_slots_db'))||[];db.push(fhir);localStorage.setItem('fhir_slots_db',JSON.stringify(db));console.log("✅ Slot:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Slot';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
