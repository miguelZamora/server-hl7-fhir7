<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>AppointmentResponse - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-reply"></i> AppointmentResponse</h1><p>Respuesta a cita (FHIR AppointmentResponse)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-calendar"></i> Cita Relacionada</h2>
<div class="grid-2"><div class="form-group full-width"><label>Referencia Cita</label><input type="text" id="appointmentRef" placeholder="Appointment/example" required></div><div class="form-group full-width"><label>Nombre Cita</label><input type="text" id="appointmentDisplay" placeholder="Brian MRI results discussion"></div></div>
<h2 class="section-title"><i class="fa-solid fa-user"></i> Participante</h2>
<div class="grid-2"><div class="form-group"><label>Actor Ref</label><input type="text" id="actorRef" placeholder="Patient/example" required></div><div class="form-group"><label>Actor Nombre</label><input type="text" id="actorDisplay" placeholder="Peter James Chalmers"></div></div>
<div class="grid-2"><div class="form-group"><label>Estado Participante</label><select id="participantStatus"><option value="accepted">Aceptada</option><option value="declined">Rechazada</option><option value="tentative">Pendiente</option></select></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Respuesta</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"AppointmentResponse",id:"apr_"+Date.now().toString(36),appointment:{reference:document.getElementById('appointmentRef').value,display:document.getElementById('appointmentDisplay').value},actor:{reference:document.getElementById('actorRef').value,display:document.getElementById('actorDisplay').value},participantStatus:document.getElementById('participantStatus').value};let db=JSON.parse(localStorage.getItem('fhir_appointmentresponses_db'))||[];db.push(fhir);localStorage.setItem('fhir_appointmentresponses_db',JSON.stringify(db));console.log("✅ AppointmentResponse:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Respuesta';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
