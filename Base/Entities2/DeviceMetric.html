<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeviceMetric - FHIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/fhir-style.css">
</head>
<body>
<div class="form-container">
    <header class="form-header">
        <h1><i class="fa-solid fa-chart-simple"></i> DeviceMetric</h1>
        <p>Métrica de dispositivo médico (FHIR DeviceMetric)</p>
    </header>
    <form action="#" method="POST" id="resourceForm">
        <h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
        <div class="grid-2">
            <div class="form-group"><label>Identificador</label><input type="text" id="identifier" placeholder="345675" required></div>
            <div class="form-group"><label>Dispositivo</label><input type="text" id="deviceRef" placeholder="Device/dev1"></div>
        </div>
        <h2 class="section-title"><i class="fa-solid fa-chart-line"></i> Tipo y Unidad</h2>
        <div class="grid-2">
            <div class="form-group"><label>Tipo de Métrica</label><input type="text" id="type" placeholder="MDC_PULS_OXIM_SAT_O2"></div>
            <div class="form-group"><label>Unidad</label><input type="text" id="unit" placeholder="MDC_DIM_PERCENT"></div>
        </div>
        <h2 class="section-title"><i class="fa-solid fa-sliders"></i> Configuración</h2>
        <div class="grid-2">
            <div class="form-group"><label>Estado Operacional</label><select id="operationalStatus"><option value="on">Encendido</option><option value="off">Apagado</option><option value="standby">Espera</option></select></div>
            <div class="form-group"><label>Categoría</label><select id="category"><option value="measurement">Medición</option><option value="setting">Configuración</option><option value="calculation">Cálculo</option></select></div>
            <div class="form-group"><label>Color</label><select id="color"><option value="blue">Azul</option><option value="red">Rojo</option><option value="green">Verde</option><option value="yellow">Amarillo</option></select></div>
            <div class="form-group"><label>Frecuencia (Hz)</label><input type="number" id="frequency" value="1"></div>
        </div>
        <h2 class="section-title"><i class="fa-solid fa-calibration"></i> Calibración</h2>
        <div class="grid-2">
            <div class="form-group"><label>Tipo Calibración</label><select id="calibType"><option value="two-point">Dos puntos</option><option value="one-point">Un punto</option></select></div>
            <div class="form-group"><label>Estado Calibración</label><select id="calibState"><option value="calibrated">Calibrado</option><option value="not-calibrated">No calibrado</option></select></div>
            <div class="form-group full-width"><label>Fecha Calibración</label><input type="datetime-local" id="calibTime"></div>
        </div>
        <button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar DeviceMetric</button>
    </form>
</div>
<script>
document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"DeviceMetric",id:"dm_"+Date.now().toString(36),identifier:[{value:document.getElementById('identifier').value}],type:{coding:[{code:document.getElementById('type').value}]},unit:{coding:[{code:document.getElementById('unit').value}]},device:{reference:document.getElementById('deviceRef').value},operationalStatus:document.getElementById('operationalStatus').value,color:document.getElementById('color').value,category:document.getElementById('category').value,measurementFrequency:{value:parseFloat(document.getElementById('frequency').value),unit:"Hertz",code:"Hz"},calibration:[{type:document.getElementById('calibType').value,state:document.getElementById('calibState').value,time:document.getElementById('calibTime').value}]};let db=JSON.parse(localStorage.getItem('fhir_devicemetrics_db'))||[];db.push(fhir);localStorage.setItem('fhir_devicemetrics_db',JSON.stringify(db));console.log("✅ DeviceMetric:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar DeviceMetric';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});
</script>
</body>
</html>
