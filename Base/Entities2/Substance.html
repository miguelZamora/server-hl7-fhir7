<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substance - FHIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/fhir-style.css">
</head>
<body>
<div class="form-container">
    <header class="form-header">
        <h1><i class="fa-solid fa-flask"></i> Substance</h1>
        <p>Sustancia (FHIR Substance)</p>
    </header>
    <form action="#" method="POST" id="resourceForm">
        <h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
        <div class="grid-2">
            <div class="form-group"><label>Identificador</label><input type="text" id="identifier" placeholder="1463" required></div>
            <div class="form-group"><label>Nombre de Sustancia</label><input type="text" id="name" placeholder="apitoxin (Honey Bee Venom)" required></div>
        </div>
        <h2 class="section-title"><i class="fa-solid fa-folder"></i> Categoría y Estado</h2>
        <div class="grid-2">
            <div class="form-group"><label>Categoría</label><select id="category"><option value="allergen">Alérgeno</option><option value="drug">Medicamento</option><option value="chemical">Químico</option></select></div>
            <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="inactive">Inactivo</option></select></div>
        </div>
        <div class="form-group">
            <label>Instancia</label>
            <select id="instance"><option value="false">No (Sustancia general)</option><option value="true">Sí (Instancia específica)</option></select>
        </div>
        <button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Substance</button>
    </form>
</div>
<script>
document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Substance",id:"sub_"+Date.now().toString(36),identifier:[{value:document.getElementById('identifier').value}],instance:document.getElementById('instance').value==='true',status:document.getElementById('status').value,category:[{coding:[{system:"http://terminology.hl7.org/CodeSystem/substance-category",code:document.getElementById('category').value}]}],code:{concept:{text:document.getElementById('name').value}}};let db=JSON.parse(localStorage.getItem('fhir_substances_db'))||[];db.push(fhir);localStorage.setItem('fhir_substances_db',JSON.stringify(db));console.log("✅ Substance:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Substance';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});
</script>
</body>
</html>
