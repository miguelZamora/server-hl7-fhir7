<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definición de Grupo - FHIR</title>
    <!-- Mismo diseño Cyan/Glassmorphism -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0EA5E9;
            --primary-hover: #0284C7;
            --primary-dark: #0369A1;
            --secondary: #38BDF8;
            --dark: #0F172A;
            --bg-gradient: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            --glass: rgba(255, 255, 255, 0.95);
            --border: #BAE6FD;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --focus-ring: rgba(14, 165, 233, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; padding: 3rem 1rem; color: var(--text-dark); }
        .form-container { width: 100%; max-width: 900px; background: var(--glass); border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05); overflow: hidden; border: 1px solid white; }
        .form-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 2.5rem; text-align: center; }
        .form-header h1 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .form-header p { color: rgba(255, 255, 255, 0.9); font-size: 1rem; font-weight: 300; }
        form { padding: 3rem; }
        .section-title { font-size: 1.2rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 2px solid #E0F2FE; display: flex; align-items: center; gap: 0.5rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.9rem; font-weight: 600; color: var(--text-dark); }
        input, select, textarea { width: 100%; padding: 0.875rem 1rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; background: white; transition: all 0.2s ease; color: var(--text-dark); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--focus-ring); }
        textarea { resize: vertical; min-height: 80px; }
        .full-width { grid-column: span 2; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 1.2rem 2rem; font-size: 1.1rem; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 0.75rem; margin-top: 1rem; box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2); }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(14, 165, 233, 0.3); }

        .members-section { background: #F8FAFC; padding: 1.5rem; border-radius: 12px; border: 1px dashed #CBD5E1; margin-bottom: 2rem; }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            form { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <header class="form-header">
            <h1><i class="fa-solid fa-users-rectangle"></i> Definición de Grupo</h1>
            <p>Colección de Entidades Médicas/Investigación (FHIR Group)</p>
        </header>

        <form action="#" method="POST" id="groupForm">
            
            <!-- DATOS GENERALES -->
            <h2 class="section-title"><i class="fa-solid fa-layer-group"></i> Atributos del Grupo</h2>
            <div class="grid-2">
                <div class="form-group full-width">
                    <label for="name">Nombre del Grupo</label>
                    <input type="text" id="name" name="name" placeholder="Ej. Ensayo Clínico Fase 3 / Terapia Grupal B" required>
                </div>
                <div class="form-group full-width">
                    <label for="description">Descripción Detallada</label>
                    <textarea id="description" name="description" placeholder="Propósito del grupo, características esperadas..."></textarea>
                </div>
                <div class="form-group">
                    <label for="type">Tipo de Referencia</label>
                    <select id="type" name="type" required>
                        <option value="person" selected>Personas / Pacientes</option>
                        <option value="practitioner">Profesionales</option>
                        <option value="device">Dispositivos Médicos</option>
                        <option value="animal">Animales</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="membership">Mecanismo de Filtro (Membership)</label>
                    <select id="membership" name="membership" required>
                        <option value="enumerated" title="Lista estricta definida por Miembros abajo">Listado Explicitó (Enumerated)</option>
                        <option value="definitional" title="Se basa en características dinámicas, no importa quién esté enlistado">Por Definición de Atributos (Definitional)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Cantidad de Entidades</label>
                    <input type="number" id="quantity" name="quantity" min="0" placeholder="Ej. 15">
                </div>
                <div class="form-group">
                    <label for="managingEntity">Organización Custodio (Managing Entity)</label>
                    <input type="text" id="managingEntity" name="managingEntity" placeholder="Ej. Organization/f001">
                </div>
            </div>

            <!-- MIEMBROS -->
            <div class="members-section">
                <h2 class="section-title" style="border:none; margin-bottom: 1rem;"><i class="fa-solid fa-user-plus"></i> Miembros Iniciales (Para 'Enumerated')</h2>
                <div class="grid-2" style="margin-bottom:0;">
                    <div class="form-group">
                        <label for="member1">Entidad 1 (Referencia)</label>
                        <input type="text" id="member1" name="member1" placeholder="Ej. Patient/123">
                    </div>
                    <div class="form-group">
                        <label for="member2">Entidad 2 (Referencia)</label>
                        <input type="text" id="member2" name="member2" placeholder="Ej. Patient/456">
                    </div>
                </div>
            </div>

            <!-- BOTÓN ENVIAR -->
            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-folder-plus"></i> Consolidar Colección (Grupo)
            </button>
        </form>
    </div>

    <script>
        document.getElementById('groupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Grabando Grupo...';
            btn.style.background = '#10B981';
            
            // Construir FHIR Group
            const fhirGroup = {
                "resourceType": "Group",
                "id": "group_" + Date.now().toString(36),
                "active": true,
                "type": document.getElementById('type').value,
                "membership": document.getElementById('membership').value,
                "name": document.getElementById('name').value,
                "description": document.getElementById('description').value,
                "member": []
            };

            const qty = document.getElementById('quantity').value;
            if(qty) fhirGroup.quantity = parseInt(qty);

            const managing = document.getElementById('managingEntity').value;
            if(managing) fhirGroup.managingEntity = { "reference": managing };

            const mem1 = document.getElementById('member1').value;
            if(mem1) fhirGroup.member.push({ "entity": { "reference": mem1 }, "inactive": false });

            const mem2 = document.getElementById('member2').value;
            if(mem2) fhirGroup.member.push({ "entity": { "reference": mem2 }, "inactive": false });

            // Simular guardado offline
            let offlineDb = JSON.parse(localStorage.getItem('fhir_groups_db')) || [];
            offlineDb.push(fhirGroup);
            localStorage.setItem('fhir_groups_db', JSON.stringify(offlineDb));
            
            console.log("✅ Group Collection Creada:", fhirGroup);

            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> ¡Grupo Configurado!';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-solid fa-folder-plus"></i> Consolidar Colección (Grupo)';
                    btn.style.background = 'var(--primary)';
                    e.target.reset();
                }, 3000);
            }, 800);
        });
    </script>
</body>
</html>
