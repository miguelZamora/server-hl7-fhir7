<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>EncounterHistory - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-clock-rotate-left"></i> EncounterHistory</h1><p>Historial del encuentro (FHIR EncounterHistory)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-link"></i> Encuentro Referencia</h2>
<div class="grid-2"><div class="form-group full-width"><label>Referencia Encounter</label><input type="text" id="encounterRef" placeholder="Encounter/example" required></div></div>
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>Identificador</label><input type="text" id="identifier" placeholder="v2452"></div></div>
<h2 class="section-title"><i class="fa-solid fa-user"></i> Paciente</h2>
<div class="grid-2"><div class="form-group"><label>Paciente Ref</label><input type="text" id="subjectRef" placeholder="Patient/example"></div><div class="form-group"><label>Estado</label><select id="status"><option value="in-progress">En progreso</option><option value="finished">Finalizado</option></select></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Historial</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"EncounterHistory",id:"ech_"+Date.now().toString(36),encounter:{reference:document.getElementById('encounterRef').value},identifier:[{value:document.getElementById('identifier').value}],status:document.getElementById('status').value,subject:{reference:document.getElementById('subjectRef').value}};let db=JSON.parse(localStorage.getItem('fhir_encounterhistories_db'))||[];db.push(fhir);localStorage.setItem('fhir_encounterhistories_db',JSON.stringify(db));console.log("✅ EncounterHistory:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Historial';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
