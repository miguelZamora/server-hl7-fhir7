<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Flag - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-flag"></i> Flag</h1><p>Alerta / Bandera (FHIR Flag)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-user"></i> Sujeto</h2>
<div class="grid-2"><div class="form-group"><label>Paciente Ref</label><input type="text" id="subjectRef" placeholder="Patient/example" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="inactive">Inactivo</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Código y Categoría</h2>
<div class="grid-2"><div class="form-group full-width"><label>Código Alerta</label><input type="text" id="code" placeholder="bigdog" required></div><div class="form-group full-width"><label>Texto Alerta</label><textarea id="codeText" placeholder="Patient has a big dog at his home..."></textarea></div><div class="form-group"><label>Categoría</label><select id="category"><option value="safety">Seguridad</option><option value="clinical">Clínica</option><option value="administrative">Administrativa</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-calendar"></i> Período</h2>
<div class="grid-2"><div class="form-group"><label>Fecha Inicio</label><input type="date" id="periodStart"></div><div class="form-group"><label>Fecha Fin</label><input type="date" id="periodEnd"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Flag</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Flag",id:"flag_"+Date.now().toString(36),status:document.getElementById('status').value,category:[{coding:[{code:document.getElementById('category').value}]}],code:{coding:[{code:document.getElementById('code').value}],text:document.getElementById('codeText').value},subject:{reference:document.getElementById('subjectRef').value},period:{start:document.getElementById('periodStart').value,end:document.getElementById('periodEnd').value}};let db=JSON.parse(localStorage.getItem('fhir_flags_db'))||[];db.push(fhir);localStorage.setItem('fhir_flags_db',JSON.stringify(db));console.log("✅ Flag:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Flag';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
