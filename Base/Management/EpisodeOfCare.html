<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>EpisodeOfCare - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-chart-line"></i> EpisodeOfCare</h1><p>Episodio de atención (FHIR EpisodeOfCare)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-user"></i> Paciente</h2>
<div class="grid-2"><div class="form-group"><label>Paciente Ref</label><input type="text" id="patientRef" placeholder="Patient/example" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="finished">Finalizado</option><option value="cancelled">Cancelado</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-calendar"></i> Período</h2>
<div class="grid-2"><div class="form-group"><label>Fecha Inicio</label><input type="date" id="periodStart" required></div><div class="form-group"><label>Fecha Fin</label><input type="date" id="periodEnd"></div></div>
<h2 class="section-title"><i class="fa-solid fa-building"></i> Organización</h2>
<div class="grid-2"><div class="form-group"><label>Organización Ref</label><input type="text" id="managingOrg" placeholder="Organization/hl7"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar EpisodeOfCare</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"EpisodeOfCare",id:"ep_"+Date.now().toString(36),status:document.getElementById('status').value,patient:{reference:document.getElementById('patientRef').value},managingOrganization:{reference:document.getElementById('managingOrg').value},period:{start:document.getElementById('periodStart').value,end:document.getElementById('periodEnd').value}};let db=JSON.parse(localStorage.getItem('fhir_episodes_db'))||[];db.push(fhir);localStorage.setItem('fhir_episodes_db',JSON.stringify(db));console.log("✅ EpisodeOfCare:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar EpisodeOfCare';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
