<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Encounter - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-hospital-user"></i> Encounter</h1><p>Encuentro clínico (FHIR Encounter)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-user"></i> Paciente</h2>
<div class="grid-2"><div class="form-group"><label>Paciente Ref</label><input type="text" id="subjectRef" placeholder="Patient/example" required></div></div>
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Estado y Clase</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="in-progress">En progreso</option><option value="finished">Finalizado</option><option value="planned">Planificado</option></select></div><div class="form-group"><label>Clase</label><select id="class"><option value="IMP">Hospitalización</option><option value="AMB">Ambulatoria</option><option value="EMER">Emergencia</option></select></div></div>
<div class="form-group full-width"><label>Estado del Sujeto</label><input type="text" id="subjectStatus" placeholder="receiving-care"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Encounter</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Encounter",id:"enc_"+Date.now().toString(36),status:document.getElementById('status').value,class:[{coding:[{system:"http://terminology.hl7.org/CodeSystem/v3-ActCode",code:document.getElementById('class').value}]}],subject:{reference:document.getElementById('subjectRef').value},subjectStatus:{coding:[{code:document.getElementById('subjectStatus').value}]}};let db=JSON.parse(localStorage.getItem('fhir_encounters_db'))||[];db.push(fhir);localStorage.setItem('fhir_encounters_db',JSON.stringify(db));console.log("✅ Encounter:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Encounter';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
