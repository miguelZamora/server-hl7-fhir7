<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Library - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-book"></i> Library</h1><p>Biblioteca de lógica clínica (FHIR Library)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>Identificador</label><input type="text" id="identifier" placeholder="ChlamydiaScreening_Common" required></div><div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="2.0.0"></div></div>
<h2 class="section-title"><i class="fa-solid fa-heading"></i> Título y Estado</h2>
<div class="grid-2"><div class="form-group full-width"><label>Título</label><input type="text" id="title" placeholder="Chlamydia Screening Common Library" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option><option value="retired">Retirado</option></select></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Common Logic for adherence to Chlamydia Screening guidelines"></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Library</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Library",id:"lib_"+Date.now().toString(36),identifier:[{value:document.getElementById('identifier').value}],version:document.getElementById('version').value,title:document.getElementById('title').value,status:document.getElementById('status').value,description:document.getElementById('description').value,type:{coding:[{code:"logic-library"}]}};let db=JSON.parse(localStorage.getItem('fhir_libraries_db'))||[];db.push(fhir);localStorage.setItem('fhir_libraries_db',JSON.stringify(db));console.log("✅ Library:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Library';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
