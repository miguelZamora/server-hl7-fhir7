<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Endpoint - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-plug"></i> Endpoint</h1><p>Punto de conexión técnica (FHIR Endpoint)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2"><div class="form-group full-width"><label>URL / Dirección</label><input type="text" id="address" placeholder="https://sqlonfhir.azurewebsites.net/fhir" required></div></div>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="inactive">Inactivo</option></select></div><div class="form-group"><label>Tipo Conexión</label><input type="text" id="connectionType" placeholder="hl7-fhir-rest"></div></div>
<div class="grid-2"><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="CarePlan repository"></div><div class="form-group"><label>Organización</label><input type="text" id="organization" placeholder="Organization/1"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Endpoint</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Endpoint",id:"endp_"+Date.now().toString(36),status:document.getElementById('status').value,connectionType:{coding:[{system:"http://terminology.hl7.org/CodeSystem/endpoint-connection-type",code:document.getElementById('connectionType').value}]},name:document.getElementById('name').value,address:document.getElementById('address').value,managingOrganization:{reference:document.getElementById('organization').value}};let db=JSON.parse(localStorage.getItem('fhir_endpoints_db'))||[];db.push(fhir);localStorage.setItem('fhir_endpoints_db',JSON.stringify(db));console.log("✅ Endpoint:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Endpoint';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script>
</body></html>
