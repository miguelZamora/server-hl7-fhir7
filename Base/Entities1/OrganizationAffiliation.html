<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>OrganizationAffiliation - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-handshake"></i> OrganizationAffiliation</h1><p>Afiliación entre organizaciones (FHIR OrganizationAffiliation)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2"><div class="form-group"><label>Organización</label><input type="text" id="organization" placeholder="Organization/hl7pay" required></div><div class="form-group"><label>Participante</label><input type="text" id="participating" placeholder="Organization/f001" required></div></div>
<div class="grid-2"><div class="form-group"><label>Activo</label><select id="active"><option value="true">Sí</option><option value="false">No</option></select></div><div class="form-group"><label>Código</label><input type="text" id="code" placeholder="provider"></div></div>
<div class="grid-2"><div class="form-group"><label>Fecha Inicio</label><input type="date" id="periodStart"></div><div class="form-group"><label>Fecha Fin</label><input type="date" id="periodEnd"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Afiliación</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"OrganizationAffiliation",id:"orgaff_"+Date.now().toString(36),active:document.getElementById('active').value==='true',organization:{reference:document.getElementById('organization').value},participatingOrganization:{reference:document.getElementById('participating').value},code:[{coding:[{code:document.getElementById('code').value}]}],period:{start:document.getElementById('periodStart').value,end:document.getElementById('periodEnd').value}};let db=JSON.parse(localStorage.getItem('fhir_orgaffiliations_db'))||[];db.push(fhir);localStorage.setItem('fhir_orgaffiliations_db',JSON.stringify(db));console.log("✅ OrganizationAffiliation:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Afiliación';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script>
</body></html>
