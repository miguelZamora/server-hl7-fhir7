<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ChargeItem - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-hand-holding-dollar"></i> Ítem de Cargo</h1><p>Registro de costo a facturar (FHIR ChargeItem)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="billable">Para facturar</option><option value="billed">Facturado</option></select></div>
  <div class="form-group"><label>Código de Cargo</label><input type="text" id="code" placeholder="ej. Consulta Urgencia" required></div>
  <div class="form-group"><label>Cantidad</label><input type="number" id="quantity" value="1"></div>
  <div class="form-group"><label>Fecha del Cargo</label><input type="date" id="occurrence"></div>
  <div class="form-group"><label>Actor (Quien realizó)</label><input type="text" id="performer" placeholder="Practitioner/example"></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Cargo</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"ChargeItem",status:document.getElementById('status').value,code:{text:document.getElementById('code').value},subject:{reference:document.getElementById('patient').value},quantity:{value:parseFloat(document.getElementById('quantity').value)},occurrenceDateTime:document.getElementById('occurrence').value,performer:[{actor:{reference:document.getElementById('performer').value}}]};console.log("✅ ChargeItem:",fhir);});</script></body></html>
