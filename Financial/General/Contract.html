<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contract - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-file-contract"></i> Contrato Clínico</h1><p>Acuerdos legales o clínicos (FHIR Contract)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Sujeto</label><input type="text" id="subject" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="draft">Borrador</option></select></div>
  <div class="form-group"><label>Tipo de Contrato</label><input type="text" id="type" placeholder="ej. Acuerdo de Privacidad"></div>
  <div class="form-group full-width"><label>Términos del Contrato</label><textarea id="term" placeholder="Detalles legales..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Contrato</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"Contract",status:document.getElementById('status').value,subject:[{reference:document.getElementById('subject').value}],type:{text:document.getElementById('type').value},term:[{text:document.getElementById('term').value}]};console.log("✅ Contract:",fhir);});</script></body></html>
