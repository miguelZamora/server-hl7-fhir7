<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PaymentReconciliation - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-arrows-spin"></i> Conciliación de Pago</h1><p>Detalle de transacciones (FHIR PaymentReconciliation)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="cancelled">Cancelado</option></select></div>
  <div class="form-group"><label>Período (Desde)</label><input type="date" id="start"></div>
  <div class="form-group"><label>Período (Hasta)</label><input type="date" id="end"></div>
  <div class="form-group"><label>Monto Total</label><input type="number" id="amount" step="0.01" required></div>
  <div class="form-group"><label>Moneda</label><select id="currency"><option value="USD">USD</option><option value="PEN">PEN</option></select></div>
  <div class="form-group"><label>Organización / Emisor</label><input type="text" id="organization" placeholder="Organization/example" required></div>
  <div class="form-group full-width"><label>Detalle de Liquidación</label><textarea id="disposition" placeholder="Observaciones adicionales..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Conciliación</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"PaymentReconciliation",status:document.getElementById('status').value,period:{start:document.getElementById('start').value,end:document.getElementById('end').value},paymentAmount:{value:parseFloat(document.getElementById('amount').value),currency:document.getElementById('currency').value},organization:{reference:document.getElementById('organization').value},disposition:document.getElementById('disposition').value};console.log("✅ PaymentReconciliation:",fhir);});</script></body></html>
