<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Coverage - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-shield-halved"></i> Cobertura Detallada</h1><p>Gestión de seguros y pólizas (FHIR Coverage)</p></header>
<form action="#" method="POST" id="resourceForm">
  
  <h2 class="section-title"><i class="fa-solid fa-id-card"></i> Identificación de Póliza</h2>
  <div class="grid-2">
    <div class="form-group"><label>ID de Certificado</label><input type="text" id="identifier" placeholder="ej. 12345"></div>
    <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="cancelled">Cancelado</option><option value="draft">Borrador</option></select></div>
    <div class="form-group"><label>Tipo de Seguro</label><select id="type"><option value="EHCPOL">Healthcare extendido (EHCPOL)</option><option value="PUBLICPOL">Política pública</option></select></div>
    <div class="form-group"><label>Sujeto (Beneficiario)</label><input type="text" id="beneficiary" placeholder="Patient/example" required></div>
  </div>

  <h2 class="section-title"><i class="fa-solid fa-users"></i> Actores Relacionados</h2>
  <div class="grid-2">
    <div class="form-group"><label>Suscriptor (Titular)</label><input type="text" id="subscriber" placeholder="Patient/example"></div>
    <div class="form-group"><label>Policy Holder (Titular de Póliza)</label><input type="text" id="policyHolder" placeholder="Organization/Corp"></div>
    <div class="form-group"><label>Aseguradora (Insurer)</label><input type="text" id="insurer" placeholder="Organization/Insurer" required></div>
    <div class="form-group"><label>Relación con Suscriptor</label><select id="relationship"><option value="self">Propietario / Auto</option><option value="spouse">Cónyuge</option><option value="child">Hijo/a</option></select></div>
  </div>

  <h2 class="section-title"><i class="fa-solid fa-layer-group"></i> Clase y Vigencia</h2>
  <div class="grid-2">
    <div class="form-group"><label>Clase (Grupo/Plan)</label><input type="text" id="classValue" placeholder="ej. GROUP_A_123"></div>
    <div class="form-group"><label>Nombre de Clase</label><input type="text" id="className" placeholder="ej. Plan Platino Corporativo"></div>
    <div class="form-group"><label>Fecha Inicio</label><input type="date" id="start"></div>
    <div class="form-group"><label>Fecha Fin</label><input type="date" id="end"></div>
  </div>

  <button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Cobertura Detallada</button>
</form></div>

<script>
document.getElementById('resourceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.querySelector('.btn-submit');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
    
    const fhir = {
        resourceType: "Coverage",
        id: "cov_" + Date.now().toString(36),
        status: document.getElementById('status').value,
        identifier: [{ system: "http://benefitsinc.com/certificate", value: document.getElementById('identifier').value }],
        type: { coding: [{ code: document.getElementById('type').value }] },
        beneficiary: { reference: document.getElementById('beneficiary').value },
        subscriber: { reference: document.getElementById('subscriber').value },
        policyHolder: { reference: document.getElementById('policyHolder').value },
        insurer: { reference: document.getElementById('insurer').value },
        relationship: { coding: [{ code: document.getElementById('relationship').value }] },
        period: { start: document.getElementById('start').value, end: document.getElementById('end').value },
        class: [{
            type: { coding: [{ code: "group" }] },
            value: { value: document.getElementById('classValue').value },
            name: document.getElementById('className').value
        }]
    };

    let db = JSON.parse(localStorage.getItem('fhir_coverages_db')) || [];
    db.push(fhir);
    localStorage.setItem('fhir_coverages_db', JSON.stringify(db));
    
    console.log("✅ Coverage Detallada:", fhir);
    
    setTimeout(() => {
        btn.innerHTML = '<i class="fa-solid fa-check"></i> ¡Guardado!';
        setTimeout(() => {
            btn.innerHTML = '<i class="fa-solid fa-save"></i> Guardar Cobertura Detallada';
            e.target.reset();
        }, 3000);
    }, 800);
});
</script>
</body></html>
