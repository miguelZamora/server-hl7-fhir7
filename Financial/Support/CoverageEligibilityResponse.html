<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CoverageEligibilityResponse - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-check-to-slot"></i> Respuesta de Elegibilidad</h1><p>Resultado de consulta (FHIR CoverageEligibilityResponse)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Solicitud Original</label><input type="text" id="request" placeholder="CoverageEligibilityRequest/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="cancelled">Cancelado</option></select></div>
  <div class="form-group"><label>Resultado</label><select id="outcome"><option value="queued">En cola</option><option value="complete">Completado</option><option value="error">Error</option></select></div>
  <div class="form-group"><label>Paciente</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Aseguradora</label><input type="text" id="insurer" placeholder="Organization/example" required></div>
  <div class="form-group full-width"><label>Detalles / Errores</label><textarea id="disposition" placeholder="Comentarios sobre la respuesta..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Respuesta</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"CoverageEligibilityResponse",status:document.getElementById('status').value,outcome:document.getElementById('outcome').value,patient:{reference:document.getElementById('patient').value},request:{reference:document.getElementById('request').value},insurer:{reference:document.getElementById('insurer').value},disposition:document.getElementById('disposition').value};console.log("✅ CoverageEligibilityResponse:",fhir);});</script></body></html>
