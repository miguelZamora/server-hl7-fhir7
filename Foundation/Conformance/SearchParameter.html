<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>SearchParameter - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-search"></i> SearchParameter</h1><p>Parámetros de búsqueda (FHIR SearchParameter)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/SearchParameter/example" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="IDSEARCHPARAMETER" required></div></div>
<div class="grid-2"><div class="form-group"><label>Código</label><input type="text" id="code" placeholder="_id" required></div><div class="form-group"><label>Base</label><input type="text" id="base" placeholder="Resource" required></div></div>
<div class="grid-2"><div class="form-group"><label>Tipo</label><select id="type"><option value="token">Token</option><option value="string">String</option><option value="reference">Referencia</option></select></div><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div></div>
<div class="form-group full-width"><label>Expresión</label><input type="text" id="expression" placeholder="id"></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Search by resource identifier..."></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar SearchParameter</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"SearchParameter",id:"sp_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,code:document.getElementById('code').value,base:[document.getElementById('base').value],type:document.getElementById('type').value,expression:document.getElementById('expression').value,status:document.getElementById('status').value,description:document.getElementById('description').value};let db=JSON.parse(localStorage.getItem('fhir_searchparams_db'))||[];db.push(fhir);localStorage.setItem('fhir_searchparams_db',JSON.stringify(db));console.log("✅ SearchParameter:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar SearchParameter';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
