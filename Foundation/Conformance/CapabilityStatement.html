<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>CapabilityStatement - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-server"></i> CapabilityStatement</h1><p>Declaración de capacidades del servidor (FHIR CapabilityStatement)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="urn:uuid:68d043b5-9ecf-4559-a57a-396e0d452311" required></div><div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="20130510"></div></div>
<div class="grid-2"><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="ACMEEHR" required></div><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="ACME EHR capability statement"></div></div>
<h2 class="section-title"><i class="fa-solid fa-info-circle"></i> Estado</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option><option value="retired">Retirado</option></select></div><div class="form-group"><label>Fecha</label><input type="date" id="date" required></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Descripción de las capacidades..."></textarea></div>
<div class="form-group full-width"><label>Editor</label><input type="text" id="publisher" placeholder="ACME Corporation"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar CapabilityStatement</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"CapabilityStatement",id:"caps_"+Date.now().toString(36),url:document.getElementById('url').value,version:document.getElementById('version').value,name:document.getElementById('name').value,title:document.getElementById('title').value,status:document.getElementById('status').value,date:document.getElementById('date').value,description:document.getElementById('description').value,publisher:document.getElementById('publisher').value,kind:"instance",fhirVersion:"5.0.0",format:["json","xml"]};let db=JSON.parse(localStorage.getItem('fhir_capabilities_db'))||[];db.push(fhir);localStorage.setItem('fhir_capabilities_db',JSON.stringify(db));console.log("✅ CapabilityStatement:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar CapabilityStatement';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
