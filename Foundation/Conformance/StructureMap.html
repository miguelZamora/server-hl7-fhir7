<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>StructureMap - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-code-branch"></i> StructureMap</h1><p>Mapa de transformación de estructuras (FHIR StructureMap)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/StructureMap/example" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="ExampleMap" required></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="Example Map"></div><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Example Structure Map"></textarea></div>
<div class="form-group full-width"><label>Grupo (transformación)</label><textarea id="group" placeholder="group Examples(source testSrc, target testTgt) { ... }" rows="4"></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar StructureMap</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"StructureMap",id:"map_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,title:document.getElementById('title').value,status:document.getElementById('status').value,description:document.getElementById('description').value,group:[]};let db=JSON.parse(localStorage.getItem('fhir_structuremaps_db'))||[];db.push(fhir);localStorage.setItem('fhir_structuremaps_db',JSON.stringify(db));console.log("✅ StructureMap:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar StructureMap';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
