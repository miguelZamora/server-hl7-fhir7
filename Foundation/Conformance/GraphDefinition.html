<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>GraphDefinition - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-project-diagram"></i> GraphDefinition</h1><p>Definición de grafos de recursos (FHIR GraphDefinition)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://h7.org/fhir/GraphDefinition/example" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="DocumentGenerationTemplate" required></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="Document Generation Template"></div><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Specify to include list references when generating a document..."></textarea></div>
<div class="form-group"><label>Nodo Inicio</label><input type="text" id="start" placeholder="comp1"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar GraphDefinition</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"GraphDefinition",id:"graph_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,title:document.getElementById('title').value,status:document.getElementById('status').value,description:document.getElementById('description').value,start:document.getElementById('start').value,node:[],link:[]};let db=JSON.parse(localStorage.getItem('fhir_graphs_db'))||[];db.push(fhir);localStorage.setItem('fhir_graphs_db',JSON.stringify(db));console.log("✅ GraphDefinition:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar GraphDefinition';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
