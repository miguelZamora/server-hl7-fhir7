<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>ImplementationGuide - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-book-open"></i> ImplementationGuide</h1><p>Guía de implementación FHIR</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/us/daf" required></div><div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="0"></div></div>
<div class="grid-2"><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="DataAccessFrameworkDAF" required></div><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="Data Access Framework (DAF)"></div></div>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div><div class="form-group"><label>PackageId</label><input type="text" id="packageId" placeholder="hl7.fhir.us.daf"></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="The Data Access Framework (DAF) Initiative..."></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar ImplementationGuide</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"ImplementationGuide",id:"ig_"+Date.now().toString(36),url:document.getElementById('url').value,version:document.getElementById('version').value,name:document.getElementById('name').value,title:document.getElementById('title').value,status:document.getElementById('status').value,packageId:document.getElementById('packageId').value,description:document.getElementById('description').value};let db=JSON.parse(localStorage.getItem('fhir_implementationguides_db'))||[];db.push(fhir);localStorage.setItem('fhir_implementationguides_db',JSON.stringify(db));console.log("✅ ImplementationGuide:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar ImplementationGuide';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
