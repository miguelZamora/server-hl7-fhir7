<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>StructureDefinition - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-cube"></i> StructureDefinition</h1><p>Definición de estructuras (FHIR StructureDefinition)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/StructureDefinition/Element" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="Element" required></div></div>
<div class="grid-2"><div class="form-group"><label>Tipo</label><input type="text" id="type" placeholder="Element" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div></div>
<div class="grid-2"><div class="form-group"><label>Kind</label><select id="kind"><option value="complex-type">Tipo complejo</option><option value="resource">Recurso</option><option value="primitive-type">Tipo primitivo</option></select></div><div class="form-group"><label>Abstracto</label><select id="abstract"><option value="true">Sí</option><option value="false">No</option></select></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Base definition for all elements in a resource"></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar StructureDefinition</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"StructureDefinition",id:"sd_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,status:document.getElementById('status').value,kind:document.getElementById('kind').value,"abstract":document.getElementById('abstract').value==='true',type:document.getElementById('type').value,description:document.getElementById('description').value};let db=JSON.parse(localStorage.getItem('fhir_structures_db'))||[];db.push(fhir);localStorage.setItem('fhir_structures_db',JSON.stringify(db));console.log("✅ StructureDefinition:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar StructureDefinition';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
