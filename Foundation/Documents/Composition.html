<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composition - FHIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/fhir-style.css">
</head>
<body>
<div class="form-container">
    <header class="form-header">
        <h1><i class="fa-solid fa-file-alt"></i> Composition</h1>
        <p>Composición documental / Nota clínica (FHIR Composition)</p>
    </header>
    <form action="#" method="POST" id="resourceForm">
        <h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
        <div class="grid-2">
            <div class="form-group"><label>Identificador</label><input type="text" id="identifier" placeholder="1" required></div>
            <div class="form-group"><label>Estado</label><select id="status"><option value="final">Final</option><option value="preliminary">Preliminar</option></select></div>
        </div>
        <h2 class="section-title"><i class="fa-solid fa-info-circle"></i> Metadatos</h2>
        <div class="grid-2">
            <div class="form-group full-width"><label>Tipo (LOINC)</label><input type="text" id="typeCode" placeholder="11488-4" required></div>
            <div class="form-group full-width"><label>Título</label><input type="text" id="title" placeholder="Consultation Note" required></div>
        </div>
        <h2 class="section-title"><i class="fa-solid fa-user"></i> Paciente y Encuentro</h2>
        <div class="grid-2">
            <div class="form-group"><label>Paciente Ref</label><input type="text" id="subjectRef" placeholder="Patient/xcda" required></div>
            <div class="form-group"><label>Paciente Nombre</label><input type="text" id="subjectDisplay" placeholder="Henry Levin the 7th"></div>
            <div class="form-group"><label>Encuentro Ref</label><input type="text" id="encounterRef" placeholder="Encounter/xcda"></div>
            <div class="form-group"><label>Fecha</label><input type="datetime-local" id="date" required></div>
        </div>
        <h2 class="section-title"><i class="fa-solid fa-user-md"></i> Autor y Custodio</h2>
        <div class="grid-2">
            <div class="form-group"><label>Autor Ref</label><input type="text" id="authorRef" placeholder="Practitioner/xcda-author" required></div>
            <div class="form-group"><label>Autor Nombre</label><input type="text" id="authorDisplay" placeholder="Harold Hippocrates, MD"></div>
            <div class="form-group"><label>Custodio Ref</label><input type="text" id="custodianRef" placeholder="Organization/2.16.840.1.113883.19.5"></div>
            <div class="form-group"><label>Custodio Nombre</label><input type="text" id="custodianDisplay" placeholder="Good Health Clinic"></div>
        </div>
        <div class="form-group full-width"><label>Descripción / Nota</label><textarea id="description" placeholder="Contenido de la nota clínica..."></textarea></div>
        <button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Composition</button>
    </form>
</div>
<script>
document.getElementById('resourceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.querySelector('.btn-submit');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
    btn.style.background = '#10B981';
    const fhir = {
        resourceType: "Composition",
        id: "comp_" + Date.now().toString(36),
        identifier: [{ value: document.getElementById('identifier').value }],
        status: document.getElementById('status').value,
        type: { coding: [{ system: "http://loinc.org", code: document.getElementById('typeCode').value }] },
        subject: [{ reference: document.getElementById('subjectRef').value, display: document.getElementById('subjectDisplay').value }],
        encounter: { reference: document.getElementById('encounterRef').value },
        date: new Date(document.getElementById('date').value).toISOString(),
        author: [{ reference: document.getElementById('authorRef').value, display: document.getElementById('authorDisplay').value }],
        title: document.getElementById('title').value,
        custodian: { reference: document.getElementById('custodianRef').value, display: document.getElementById('custodianDisplay').value },
        text: { status: "generated", div: "<div>" + document.getElementById('description').value + "</div>" }
    };
    let db = JSON.parse(localStorage.getItem('fhir_compositions_db')) || [];
    db.push(fhir);
    localStorage.setItem('fhir_compositions_db', JSON.stringify(db));
    console.log("✅ Composition:", fhir);
    setTimeout(() => {
        btn.innerHTML = '<i class="fa-solid fa-check"></i> ¡Guardado!';
        setTimeout(() => {
            btn.innerHTML = '<i class="fa-solid fa-save"></i> Guardar Composition';
            btn.style.background = 'var(--primary)';
            e.target.reset();
        }, 3000);
    }, 800);
});
</script>
</body>
</html>
