<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Permission - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-lock"></i> Permission</h1><p>Permiso (FHIR Permission)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Configuración</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="inactive">Inactivo</option><option value="draft">Borrador</option></select></div><div class="form-group"><label>Combinación</label><select id="combining"><option value="deny-overrides">Denegar prevalece</option><option value="permit-overrides">Permitir prevalece</option></select></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Permission</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Permission",id:"perm_"+Date.now().toString(36),status:document.getElementById('status').value,combining:document.getElementById('combining').value};let db=JSON.parse(localStorage.getItem('fhir_permissions_db'))||[];db.push(fhir);localStorage.setItem('fhir_permissions_db',JSON.stringify(db));console.log("✅ Permission:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Permission';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
