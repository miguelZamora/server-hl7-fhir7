<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Provenance - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-history"></i> Provenance</h1><p>Procedencia y trazabilidad (FHIR Provenance)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-bullseye"></i> Target</h2>
<div class="grid-2"><div class="form-group full-width"><label>Referencia Target</label><input type="text" id="targetRef" placeholder="Procedure/example/_history/1" required></div></div>
<h2 class="section-title"><i class="fa-solid fa-calendar"></i> Ocurrencia</h2>
<div class="grid-2"><div class="form-group"><label>Fecha Inicio</label><input type="date" id="occurredStart" required></div><div class="form-group"><label>Fecha Fin</label><input type="date" id="occurredEnd"></div></div>
<div class="grid-2"><div class="form-group"><label>Fecha Registro</label><input type="datetime-local" id="recorded" required></div><div class="form-group"><label>Actividad</label><input type="text" id="activity" placeholder="Referral"></div></div>
<h2 class="section-title"><i class="fa-solid fa-user"></i> Agente</h2>
<div class="grid-2"><div class="form-group"><label>Tipo Agente</label><select id="agentType"><option value="AUT">Autor</option><option value="DEV">Dispositivo</option><option value="INF">Informante</option></select></div><div class="form-group"><label>Referencia Agente</label><input type="text" id="agentWho" placeholder="Practitioner/xcda-author"></div></div>
<div class="form-group full-width"><label>Ubicación</label><input type="text" id="location" placeholder="Location/1"></div>
<div class="form-group full-width"><label>Política (URL)</label><input type="text" id="policy" placeholder="http://acme.com/fhir/Consent/25"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Provenance</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Provenance",id:"prov_"+Date.now().toString(36),target:[{reference:document.getElementById('targetRef').value}],occurredPeriod:{start:document.getElementById('occurredStart').value,end:document.getElementById('occurredEnd').value||null},recorded:new Date(document.getElementById('recorded').value).toISOString(),activity:{coding:[{code:document.getElementById('activity').value}]},agent:[{type:{coding:[{code:document.getElementById('agentType').value}]},who:{reference:document.getElementById('agentWho').value}}],location:{reference:document.getElementById('location').value},policy:[document.getElementById('policy').value]};let db=JSON.parse(localStorage.getItem('fhir_provenances_db'))||[];db.push(fhir);localStorage.setItem('fhir_provenances_db',JSON.stringify(db));console.log("✅ Provenance:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Provenance';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
