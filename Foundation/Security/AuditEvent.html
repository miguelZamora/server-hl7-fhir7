<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>AuditEvent - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-clipboard-list"></i> AuditEvent</h1><p>Evento de auditoría (FHIR AuditEvent)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>Código Evento</label><input type="text" id="code" placeholder="110120" required></div><div class="form-group"><label>Acción</label><select id="action"><option value="E">Ejecutar</option><option value="C">Crear</option><option value="R">Leer</option><option value="U">Actualizar</option><option value="D">Eliminar</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-clock"></i> Fechas</h2>
<div class="grid-2"><div class="form-group"><label>Fecha Registro</label><input type="datetime-local" id="recorded" required></div><div class="form-group"><label>Resultado</label><select id="outcome"><option value="0">Éxito</option><option value="4">Error menor</option><option value="8">Error grave</option><option value="12">Error datos</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-user"></i> Agente</h2>
<div class="grid-2"><div class="form-group"><label>Agente ID</label><input type="text" id="agentId" placeholder="Grahame"></div><div class="form-group"><label>Solicitante</label><select id="requestor"><option value="true">Sí</option><option value="false">No</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-server"></i> Fuente</h2>
<div class="grid-2"><div class="form-group full-width"><label>Observador</label><input type="text" id="observer" placeholder="Grahame's Laptop"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar AuditEvent</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"AuditEvent",id:"audit_"+Date.now().toString(36),code:{coding:[{code:document.getElementById('code').value}]},action:document.getElementById('action').value,recorded:new Date(document.getElementById('recorded').value).toISOString(),outcome:{code:{code:document.getElementById('outcome').value}},agent:[{who:{identifier:{value:document.getElementById('agentId').value}},requestor:document.getElementById('requestor').value==='true'}],source:{observer:{display:document.getElementById('observer').value}}};let db=JSON.parse(localStorage.getItem('fhir_auditevents_db'))||[];db.push(fhir);localStorage.setItem('fhir_auditevents_db',JSON.stringify(db));console.log("✅ AuditEvent:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar AuditEvent';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
