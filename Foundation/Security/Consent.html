<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Consent - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-file-signature"></i> Consent</h1><p>Consentimiento (FHIR Consent)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-user"></i> Paciente</h2>
<div class="grid-2"><div class="form-group"><label>Referencia Paciente</label><input type="text" id="subjectRef" placeholder="Patient/example" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="inactive">Inactivo</option><option value="draft">Borrador</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-calendar"></i> Fechas</h2>
<div class="grid-2"><div class="form-group"><label>Fecha</label><input type="date" id="date" required></div><div class="form-group"><label>Decisión</label><select id="decision"><option value="permit">Permitir</option><option value="deny">Denegar</option></select></div></div>
<div class="form-group full-width"><label>Categoría</label><input type="text" id="category" placeholder="59284-0"></div>
<div class="form-group full-width"><label>Organización Controladora</label><input type="text" id="controller" placeholder="Organization/f001"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Consent</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Consent",id:"consent_"+Date.now().toString(36),status:document.getElementById('status').value,category:[{coding:[{code:document.getElementById('category').value}]}],subject:{reference:document.getElementById('subjectRef').value},date:document.getElementById('date').value,controller:[{reference:document.getElementById('controller').value}],decision:document.getElementById('decision').value};let db=JSON.parse(localStorage.getItem('fhir_consents_db'))||[];db.push(fhir);localStorage.setItem('fhir_consents_db',JSON.stringify(db));console.log("✅ Consent:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Consent';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
