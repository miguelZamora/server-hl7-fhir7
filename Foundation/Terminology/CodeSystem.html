<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>CodeSystem - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-code"></i> CodeSystem</h1><p>Sistema de códigos (FHIR CodeSystem)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/CodeSystem/example" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="ACMECholCodesBlood" required></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="ACME Codes for Cholesterol"></div><div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="5.0.0"></div></div>
<h2 class="section-title"><i class="fa-solid fa-info-circle"></i> Estado</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option><option value="retired">Retirado</option></select></div><div class="form-group"><label>Contenido</label><select id="content"><option value="complete">Completo</option><option value="fragment">Fragmento</option><option value="supplement">Suplemento</option></select></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="This is an example code system..."></textarea></div>
<div class="form-group"><label>Case Sensitive</label><select id="caseSensitive"><option value="true">Sí</option><option value="false">No</option></select></div>
<div class="form-group full-width"><label>Conceptos (código|display|definición, separados por coma)</label><textarea id="concepts" placeholder="chol-mmol|SChol (mmol/L)|Serum Cholesterol in mmol/L, chol-mass|SChol (mg/L)|Serum Cholesterol in mg/L" rows="3"></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar CodeSystem</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const conceptos=document.getElementById('concepts').value.split(',').filter(c=>c.trim());const conceptsArr=conceptos.map(c=>{const parts=c.split('|');return{code:parts[0]?.trim(),display:parts[1]?.trim(),definition:parts[2]?.trim()}});const fhir={resourceType:"CodeSystem",id:"cs_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,title:document.getElementById('title').value,version:document.getElementById('version').value,status:document.getElementById('status').value,content:document.getElementById('content').value,description:document.getElementById('description').value,caseSensitive:document.getElementById('caseSensitive').value==='true',concept:conceptsArr};let db=JSON.parse(localStorage.getItem('fhir_codesystems_db'))||[];db.push(fhir);localStorage.setItem('fhir_codesystems_db',JSON.stringify(db));console.log("✅ CodeSystem:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar CodeSystem';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
