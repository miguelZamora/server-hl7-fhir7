<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>ValueSet - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-list-ul"></i> ValueSet</h1><p>Conjunto de valores (FHIR ValueSet)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/ValueSet/example" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="LOINCCodesForCholesterolInSerumPlasma" required></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="LOINC Codes for Cholesterol"></div><div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="5.0.0"></div></div>
<h2 class="section-title"><i class="fa-solid fa-info-circle"></i> Estado</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div><div class="form-group"><label>Fecha</label><input type="date" id="date" required></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="This is an example value set..."></textarea></div>
<div class="form-group full-width"><label>Copyright</label><textarea id="copyright" placeholder="This content from LOINC..."></textarea></div>
<div class="form-group full-width"><label>Códigos (sistema|código|display, separados por coma)</label><textarea id="codes" placeholder="http://loinc.org|14647-2|Cholesterol [Moles/Volume], http://loinc.org|2093-3|Cholesterol [Mass/Volume]" rows="3"></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar ValueSet</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const codigos=document.getElementById('codes').value.split(',').filter(c=>c.trim());const conceptsArr=codigos.map(c=>{const parts=c.split('|');return{system:parts[0]?.trim(),code:parts[1]?.trim(),display:parts[2]?.trim()}});const fhir={resourceType:"ValueSet",id:"vs_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,title:document.getElementById('title').value,version:document.getElementById('version').value,status:document.getElementById('status').value,date:document.getElementById('date').value,description:document.getElementById('description').value,copyright:document.getElementById('copyright').value,compose:{include:conceptsArr.map(c=>({system:c.system,concept:[{code:c.code,display:c.display}]}))}};let db=JSON.parse(localStorage.getItem('fhir_valuesets_db'))||[];db.push(fhir);localStorage.setItem('fhir_valuesets_db',JSON.stringify(db));console.log("✅ ValueSet:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar ValueSet';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
