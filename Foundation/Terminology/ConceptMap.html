<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>ConceptMap - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-map"></i> ConceptMap</h1><p>Mapa de conceptos (FHIR ConceptMap)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/ConceptMap/101" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="FHIRv3AddressUse" required></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="FHIR/v3 Address Use Mapping"></div><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-code-branch"></i> Fuente y Destino</h2>
<div class="grid-2"><div class="form-group"><label>Source URI</label><input type="text" id="sourceScope" placeholder="http://hl7.org/fhir/ValueSet/address-use"></div><div class="form-group"><label>Target URI</label><input type="text" id="targetScope" placeholder="http://terminology.hl7.org/ValueSet/v3-AddressUse"></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="A mapping between FHIR and HL7 v3 AddressUse Code systems"></textarea></div>
<div class="form-group full-width"><label>Mapeos (source|target|relationship, separados por coma)</label><textarea id="mappings" placeholder="home|H|equivalent, work|WP|equivalent, temp|TMP|equivalent" rows="3"></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar ConceptMap</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const mapeos=document.getElementById('mappings').value.split(',').filter(m=>m.trim());const groupElements=mapeos.map(m=>{const parts=m.split('|');return{code:parts[0]?.trim(),target:[{code:parts[1]?.trim(),relationship:parts[2]?.trim()||"equivalent"}]}});const fhir={resourceType:"ConceptMap",id:"cm_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,title:document.getElementById('title').value,status:document.getElementById('status').value,description:document.getElementById('description').value,sourceScopeUri:document.getElementById('sourceScope').value,targetScopeUri:document.getElementById('targetScope').value,group:[{source:"http://hl7.org/fhir/address-use",target:"http://terminology.hl7.org/CodeSystem/v3-AddressUse",element:groupElements}]};let db=JSON.parse(localStorage.getItem('fhir_conceptmaps_db'))||[];db.push(fhir);localStorage.setItem('fhir_conceptmaps_db',JSON.stringify(db));console.log("✅ ConceptMap:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar ConceptMap';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
