<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>TerminologyCapabilities - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-cogs"></i> TerminologyCapabilities</h1><p>Capacidades terminológicas (FHIR TerminologyCapabilities)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="urn:uuid:68d043b5-9ecf-4559-a57a-396e0d452311" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="ACMEEHR" required></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="ACME EHR capability statement"></div><div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="20130510"></div></div>
<h2 class="section-title"><i class="fa-solid fa-info-circle"></i> Estado</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div><div class="form-group"><label>Fecha</label><input type="date" id="date" required></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Terminology capabilities description..."></textarea></div>
<div class="grid-2"><div class="form-group"><label>Software</label><input type="text" id="software" placeholder="TxServer"></div><div class="form-group"><label>Versión Software</label><input type="text" id="softwareVersion" placeholder="0.1.2"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar TerminologyCapabilities</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"TerminologyCapabilities",id:"tc_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,title:document.getElementById('title').value,version:document.getElementById('version').value,status:document.getElementById('status').value,date:document.getElementById('date').value,description:document.getElementById('description').value,software:{name:document.getElementById('software').value,version:document.getElementById('softwareVersion').value},codeSearch:"in-compose-or-expansion"};let db=JSON.parse(localStorage.getItem('fhir_terminologycapabilities_db'))||[];db.push(fhir);localStorage.setItem('fhir_terminologycapabilities_db',JSON.stringify(db));console.log("✅ TerminologyCapabilities:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar TerminologyCapabilities';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
