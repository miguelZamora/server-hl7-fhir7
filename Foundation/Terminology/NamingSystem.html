<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>NamingSystem - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-tag"></i> NamingSystem</h1><p>Sistema de nomenclatura (FHIR NamingSystem)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/NamingSystem/example" required></div><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="SNOMEDCT" required></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="SNOMED CT"></div><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="draft">Borrador</option><option value="retired">Retirado</option></select></div></div>
<h2 class="section-title"><i class="fa-solid fa-info-circle"></i> Detalles</h2>
<div class="grid-2"><div class="form-group"><label>Tipo</label><select id="kind"><option value="codesystem">CodeSystem</option><option value="identifier">Identifier</option><option value="root">Root</option></select></div><div class="form-group"><label>Fecha</label><input type="date" id="date" required></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="SNOMED CT is a concept-based terminology..."></textarea></div>
<div class="form-group full-width"><label>Unique IDs (type|value|preferred, separados por coma)</label><textarea id="uniqueIds" placeholder="oid|2.16.840.1.113883.6.96|false, uri|http://snomed.info/sct|true" rows="2"></textarea></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar NamingSystem</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const ids=document.getElementById('uniqueIds').value.split(',').filter(i=>i.trim());const uniqueIdsArr=ids.map(i=>{const parts=i.split('|');return{type:parts[0]?.trim(),value:parts[1]?.trim(),preferred:parts[2]?.trim()==='true'}});const fhir={resourceType:"NamingSystem",id:"ns_"+Date.now().toString(36),url:document.getElementById('url').value,name:document.getElementById('name').value,title:document.getElementById('title').value,status:document.getElementById('status').value,kind:document.getElementById('kind').value,date:document.getElementById('date').value,description:document.getElementById('description').value,uniqueId:uniqueIdsArr};let db=JSON.parse(localStorage.getItem('fhir_namingsystems_db'))||[];db.push(fhir);localStorage.setItem('fhir_namingsystems_db',JSON.stringify(db));console.log("✅ NamingSystem:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar NamingSystem';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
