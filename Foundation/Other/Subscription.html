<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Subscription - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-bell"></i> Subscription</h1><p>Suscripción (FHIR Subscription)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>Nombre</label><input type="text" id="name" placeholder="Example" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="off">Inactivo</option><option value="error">Error</option></select></div></div>
<div class="grid-2"><div class="form-group"><label>Tema</label><input type="text" id="topic" placeholder="http://example.org/R5/SubscriptionTopic/example" required></div><div class="form-group"><label>Razón</label><input type="text" id="reason" placeholder="Example subscription"></div></div>
<h2 class="section-title"><i class="fa-solid fa-filter"></i> Filtro</h2>
<div class="grid-2"><div class="form-group"><label>ResourceType</label><input type="text" id="resourceType" placeholder="Encounter"></div><div class="form-group"><label>Parámetro</label><input type="text" id="filterParam" placeholder="patient"></div><div class="form-group"><label>Valor</label><input type="text" id="filterValue" placeholder="Patient/123"></div></div>
<h2 class="section-title"><i class="fa-solid fa-plug"></i> Canal</h2>
<div class="grid-2"><div class="form-group full-width"><label>Tipo Canal</label><select id="channelType"><option value="rest-hook">REST Hook</option><option value="websocket">WebSocket</option><option value="email">Email</option></select></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Subscription</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Subscription",id:"sub_"+Date.now().toString(36),name:document.getElementById('name').value,status:document.getElementById('status').value,topic:document.getElementById('topic').value,reason:document.getElementById('reason').value,filterBy:[{resourceType:document.getElementById('resourceType').value,filterParameter:document.getElementById('filterParam').value,value:document.getElementById('filterValue').value}],channelType:{code:document.getElementById('channelType').value}};let db=JSON.parse(localStorage.getItem('fhir_subscriptions_db'))||[];db.push(fhir);localStorage.setItem('fhir_subscriptions_db',JSON.stringify(db));console.log("✅ Subscription:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Subscription';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
