<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>MessageHeader - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-envelope-open-text"></i> MessageHeader</h1><p>Cabecera de mensaje (FHIR MessageHeader)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>Evento</label><input type="text" id="eventCode" placeholder="admin-notify" required></div><div class="form-group"><label>ID Mensaje</label><input type="text" id="messageId" placeholder="1cbdfb97-5859-48a4-8301-d54eab818d68"></div></div>
<h2 class="section-title"><i class="fa-solid fa-paper-plane"></i> Origen y Destino</h2>
<div class="grid-2"><div class="form-group"><label>Origen URL</label><input type="text" id="sourceUrl" placeholder="llp:10.11.12.13:5432" required></div><div class="form-group"><label>Origen Nombre</label><input type="text" id="sourceName" placeholder="Acme Central Patient Registry"></div></div>
<div class="grid-2"><div class="form-group"><label>Destino URL</label><input type="text" id="destUrl" placeholder="llp:10.11.12.14:5432"></div><div class="form-group"><label>Destino Nombre</label><input type="text" id="destName" placeholder="Acme Message Gateway"></div></div>
<h2 class="section-title"><i class="fa-solid fa-user"></i> Remitente y Autor</h2>
<div class="grid-2"><div class="form-group"><label>Remitente Ref</label><input type="text" id="senderRef" placeholder="Organization/1"></div><div class="form-group"><label>Autor Ref</label><input type="text" id="authorRef" placeholder="Practitioner/example"></div></div>
<div class="form-group full-width"><label>Razón</label><input type="text" id="reason" placeholder="admit"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar MessageHeader</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"MessageHeader",id:document.getElementById('messageId').value||"msg_"+Date.now().toString(36),eventCoding:{code:document.getElementById('eventCode').value},source:{endpointUrl:document.getElementById('sourceUrl').value,name:document.getElementById('sourceName').value},destination:[{endpointUrl:document.getElementById('destUrl').value,name:document.getElementById('destName').value}],sender:{reference:document.getElementById('senderRef').value},author:{reference:document.getElementById('authorRef').value},reason:{coding:[{code:document.getElementById('reason').value}]},focus:[{reference:"Patient/example"}]};let db=JSON.parse(localStorage.getItem('fhir_messageheaders_db'))||[];db.push(fhir);localStorage.setItem('fhir_messageheaders_db',JSON.stringify(db));console.log("✅ MessageHeader:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar MessageHeader';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
