<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>SubscriptionStatus - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-bell-slash"></i> SubscriptionStatus</h1><p>Estado de suscripción (FHIR SubscriptionStatus)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-info-circle"></i> Estado</h2>
<div class="grid-2"><div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="off">Inactivo</option></select></div><div class="form-group"><label>Tipo</label><select id="type"><option value="event-notification">Notificación evento</option><option value="handshake">Handshake</option><option value="query-status">Consulta estado</option></select></div></div>
<div class="grid-2"><div class="form-group"><label>Eventos desde inicio</label><input type="number" id="eventsSinceStart" placeholder="1000"></div><div class="form-group"><label>Evento número</label><input type="number" id="eventNumber" placeholder="1000"></div></div>
<div class="grid-2"><div class="form-group"><label>Referencia Suscripción</label><input type="text" id="subscriptionRef" placeholder="http://example.org/FHIR/R5/Subscription/123"></div><div class="form-group"><label>Tema</label><input type="text" id="topic" placeholder="http://example.org/FHIR/R5/SubscriptionTopic/admission"></div></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar SubscriptionStatus</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"SubscriptionStatus",id:"substat_"+Date.now().toString(36),status:document.getElementById('status').value,type:document.getElementById('type').value,eventsSinceSubscriptionStart:document.getElementById('eventsSinceStart').value,notificationEvent:[{eventNumber:document.getElementById('eventNumber').value}],subscription:{reference:document.getElementById('subscriptionRef').value},topic:document.getElementById('topic').value};let db=JSON.parse(localStorage.getItem('fhir_subscriptionstatus_db'))||[];db.push(fhir);localStorage.setItem('fhir_subscriptionstatus_db',JSON.stringify(db));console.log("✅ SubscriptionStatus:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar SubscriptionStatus';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
