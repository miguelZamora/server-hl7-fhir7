<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Bundle - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-layer-group"></i> Bundle</h1><p>Lote de recursos (FHIR Bundle)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>ID</label><input type="text" id="bundleId" placeholder="bundle-example" required></div><div class="form-group"><label>Tipo</label><select id="type"><option value="searchset">Resultado búsqueda</option><option value="transaction">Transacción</option><option value="batch">Lote</option><option value="collection">Colección</option></select></div></div>
<div class="grid-2"><div class="form-group"><label>Total</label><input type="number" id="total" placeholder="3"></div><div class="form-group"><label>Última actualización</label><input type="datetime-local" id="lastUpdated"></div></div>
<div class="form-group full-width"><label>Enlaces (relation|url, separados por coma)</label><input type="text" id="links" placeholder="self|https://example.com/base/MedicationRequest?patient=347"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Bundle</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const links=document.getElementById('links').value.split(',').filter(l=>l.trim());const linksArr=links.map(l=>{const parts=l.split('|');return{relation:parts[0]?.trim(),url:parts[1]?.trim()}});const fhir={resourceType:"Bundle",id:document.getElementById('bundleId').value,type:document.getElementById('type').value,total:parseInt(document.getElementById('total').value)||0,meta:{lastUpdated:document.getElementById('lastUpdated').value},link:linksArr,entry:[]};let db=JSON.parse(localStorage.getItem('fhir_bundles_db'))||[];db.push(fhir);localStorage.setItem('fhir_bundles_db',JSON.stringify(db));console.log("✅ Bundle:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Bundle';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
