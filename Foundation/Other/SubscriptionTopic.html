<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>SubscriptionTopic - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-topic"></i> SubscriptionTopic</h1><p>Tema de suscripción (FHIR SubscriptionTopic)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-tag"></i> Identificación</h2>
<div class="grid-2"><div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://example.org/FHIR/R5/SubscriptionTopic/example" required></div><div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="1.0.0-beta.1"></div></div>
<div class="grid-2"><div class="form-group"><label>Título</label><input type="text" id="title" placeholder="example" required></div><div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option></select></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Example topic for completed encounters"></textarea></div>
<div class="form-group full-width"><label>Resource Trigger</label><input type="text" id="resourceTrigger" placeholder="Encounter"></div>
<div class="form-group full-width"><label>Filtros (parámetro|descripción, separados por coma)</label><input type="text" id="filters" placeholder="subject|Filter based on subject, _in|Filter based on group membership"></div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar SubscriptionTopic</button></form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const filters=document.getElementById('filters').value.split(',').filter(f=>f.trim());const filtersArr=filters.map(f=>{const parts=f.split('|');return{filterParameter:parts[0]?.trim(),description:parts[1]?.trim()}});const fhir={resourceType:"SubscriptionTopic",id:"topic_"+Date.now().toString(36),url:document.getElementById('url').value,version:document.getElementById('version').value,title:document.getElementById('title').value,status:document.getElementById('status').value,description:document.getElementById('description').value,resourceTrigger:[{resource:document.getElementById('resourceTrigger').value,supportedInteraction:["update"]}],canFilterBy:filtersArr};let db=JSON.parse(localStorage.getItem('fhir_subscriptiontopics_db'))||[];db.push(fhir);localStorage.setItem('fhir_subscriptiontopics_db',JSON.stringify(db));console.log("✅ SubscriptionTopic:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar SubscriptionTopic';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});</script></body></html>
