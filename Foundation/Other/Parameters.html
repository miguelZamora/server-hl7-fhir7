<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Parameters - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-list-check"></i> Parámetros</h1><p>Entrada/Salida de operaciones (FHIR Parameters)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Nombre del Parámetro</label><input type="text" id="name" placeholder="ej. patientId" required></div>
  <div class="form-group"><label>Valor (String)</label><input type="text" id="value" placeholder="ej. 12345"></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Parámetros</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"Parameters",parameter:[{name:document.getElementById('name').value,valueString:document.getElementById('value').value}]};console.log("✅ Parameters:",fhir);});</script></body></html>
