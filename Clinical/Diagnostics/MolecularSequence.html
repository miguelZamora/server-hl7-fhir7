<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MolecularSequence - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-dna"></i> Secuencia Molecular</h1><p>Datos genómicos (FHIR MolecularSequence)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Sujeto (Paciente)</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Tipo de Secuencia</label><select id="type"><option value="dna">ADN</option><option value="rna">ARN</option><option value="aa">Aminoácidos</option></select></div>
  <div class="form-group"><label>Sistema de Referencia</label><input type="text" id="genomeBuild" placeholder="ej. GRCh38"></div>
  <div class="form-group"><label>Coordenada Inicio</label><input type="number" id="start" placeholder="12345"></div>
  <div class="form-group"><label>Coordenada Fin</label><input type="number" id="end" placeholder="67890"></div>
  <div class="form-group full-width"><label>Secuencia Literaria (Fragmento)</label><textarea id="observedSeq" placeholder="ATCG..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Secuencia</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"MolecularSequence",id:"seq_"+Date.now().toString(36),type:document.getElementById('type').value,patient:{reference:document.getElementById('patient').value},referenceSeq:{genomeBuild:document.getElementById('genomeBuild').value,windowStart:parseInt(document.getElementById('start').value),windowEnd:parseInt(document.getElementById('end').value)},observedSeq:document.getElementById('observedSeq').value};console.log("✅ MolecularSequence:",fhir);});</script></body></html>
