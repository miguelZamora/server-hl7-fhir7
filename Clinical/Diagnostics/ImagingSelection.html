<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ImagingSelection - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-magnifying-glass-plus"></i> Selección de Imagen</h1><p>Selección de hallazgos en imágenes (FHIR ImagingSelection)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Sujeto (Paciente)</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="available">Disponible</option><option value="entered-in-error">Error</option><option value="unknown">Desconocido</option></select></div>
  <div class="form-group"><label>Estudio Original</label><input type="text" id="study" placeholder="ImagingStudy/example" required></div>
  <div class="form-group"><label>Código de Hallazgo</label><input type="text" id="code" placeholder="ej. Nódulo detectado"></div>
  <div class="form-group full-width"><label>Descripción de la Selección</label><textarea id="description" placeholder="Detalles sobre por qué se seleccionó este fragmento de imagen..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Selección</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"ImagingSelection",status:document.getElementById('status').value,subject:{reference:document.getElementById('patient').value},derivedFrom:[{reference:document.getElementById('study').value}],code:{text:document.getElementById('code').value}};console.log("✅ ImagingSelection:",fhir);});</script></body></html>
