<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Specimen - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-vial"></i> Muestra Biológica</h1><p>Registro de muestras para análisis (FHIR Specimen)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-droplet"></i> Datos de la Muestra</h2>
<div class="grid-2">
  <div class="form-group"><label>Paciente / Sujeto</label><input type="text" id="subject" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Tipo de Muestra</label><select id="type"><option value="119297000">Sangre</option><option value="122575003">Orina</option><option value="258448009">Suero</option><option value="418564007">Plasma</option><option value="119323008">Tejido</option><option value="258527002">LCR</option></select></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="available">Disponible</option><option value="unavailable">No disponible</option><option value="unsatisfactory">Insatisfactoria</option><option value="entered-in-error">Error</option></select></div>
  <div class="form-group"><label>Fecha de Recolección</label><input type="datetime-local" id="collectedDateTime"></div>
  <div class="form-group"><label>Recolector</label><input type="text" id="collector" placeholder="Practitioner/example"></div>
  <div class="form-group"><label>Volumen / Cantidad</label><input type="text" id="quantity" placeholder="ej. 5 mL"></div>
  <div class="form-group"><label>Sitio Anatómico</label><input type="text" id="bodySite" placeholder="ej. Vena antecubital izquierda"></div>
  <div class="form-group"><label>Método de Recolección</label><input type="text" id="method" placeholder="ej. Venopunción, Biopsia"></div>
  <div class="form-group full-width"><label>Notas / Condición</label><textarea id="note" placeholder="Condiciones de la muestra, observaciones..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Muestra</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"Specimen",id:"spec_"+Date.now().toString(36),status:document.getElementById('status').value,type:{coding:[{system:"http://snomed.info/sct",code:document.getElementById('type').value}]},subject:{reference:document.getElementById('subject').value},collection:{collector:{reference:document.getElementById('collector').value},collectedDateTime:document.getElementById('collectedDateTime').value,bodySite:{concept:{text:document.getElementById('bodySite').value}},method:{text:document.getElementById('method').value},quantity:{value:document.getElementById('quantity').value}},note:[{text:document.getElementById('note').value}]};let db=JSON.parse(localStorage.getItem('fhir_specimens_db'))||[];db.push(fhir);localStorage.setItem('fhir_specimens_db',JSON.stringify(db));console.log("✅ Specimen:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Muestra';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});
</script>
</body></html>
