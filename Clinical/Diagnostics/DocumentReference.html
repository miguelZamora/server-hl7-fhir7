<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DocumentReference - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-file-medical"></i> Referencia de Documento</h1><p>Referencia a documentos externos (FHIR DocumentReference)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="current">Actual</option><option value="superseded">Reemplazado</option><option value="entered-in-error">Error</option></select></div>
  <div class="form-group"><label>Tipo de Documento</label><input type="text" id="type" placeholder="ej. Historia Clínica, Nota de Evolución" required></div>
  <div class="form-group"><label>Fecha</label><input type="datetime-local" id="date" required></div>
  <div class="form-group full-width"><label>URL del Documento</label><input type="text" id="url" placeholder="https://ejemplo.com/doc.pdf" required></div>
  <div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Descripción resumida del documento..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Referencia</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"DocumentReference",status:document.getElementById('status').value,type:{text:document.getElementById('type').value},subject:{reference:document.getElementById('patient').value},date:document.getElementById('date').value,content:[{attachment:{url:document.getElementById('url').value,title:document.getElementById('description').value}}]};console.log("✅ DocumentReference:",fhir);});</script></body></html>
