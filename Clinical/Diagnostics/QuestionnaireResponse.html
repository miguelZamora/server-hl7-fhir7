<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>QuestionnaireResponse - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-square-check"></i> Respuesta a Cuestionario</h1><p>Respuestas a cuestionarios clínicos (FHIR QuestionnaireResponse)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-clipboard-question"></i> Datos de la Respuesta</h2>
<div class="grid-2">
  <div class="form-group"><label>Cuestionario (URL)</label><input type="text" id="questionnaire" placeholder="http://hl7.org/fhir/Questionnaire/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="completed">Completado</option><option value="in-progress">En progreso</option><option value="amended">Enmendado</option><option value="stopped">Detenido</option></select></div>
  <div class="form-group"><label>Paciente / Sujeto</label><input type="text" id="subject" placeholder="Patient/example"></div>
  <div class="form-group"><label>Encuentro</label><input type="text" id="encounter" placeholder="Encounter/example"></div>
  <div class="form-group"><label>Fecha de Autor</label><input type="datetime-local" id="authored"></div>
  <div class="form-group"><label>Autor</label><input type="text" id="author" placeholder="Practitioner/example"></div>
  <div class="form-group full-width"><label>Pregunta 1</label><input type="text" id="q1" placeholder="linkId-1: texto de respuesta..."></div>
  <div class="form-group full-width"><label>Pregunta 2</label><input type="text" id="q2" placeholder="linkId-2: texto de respuesta..."></div>
  <div class="form-group full-width"><label>Pregunta 3</label><input type="text" id="q3" placeholder="linkId-3: texto de respuesta..."></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Respuesta</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const items=[];['q1','q2','q3'].forEach((id,i)=>{const v=document.getElementById(id).value;if(v)items.push({linkId:`${i+1}`,answer:[{valueString:v}]});});const fhir={resourceType:"QuestionnaireResponse",id:"qr_"+Date.now().toString(36),questionnaire:document.getElementById('questionnaire').value,status:document.getElementById('status').value,subject:{reference:document.getElementById('subject').value},encounter:{reference:document.getElementById('encounter').value},authored:document.getElementById('authored').value,author:{reference:document.getElementById('author').value},item:items};let db=JSON.parse(localStorage.getItem('fhir_questionnaire_responses_db'))||[];db.push(fhir);localStorage.setItem('fhir_questionnaire_responses_db',JSON.stringify(db));console.log("✅ QuestionnaireResponse:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Respuesta';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});
</script>
</body></html>
