<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MedicationKnowledge - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-book-medical"></i> Conocimiento de Medicamentos</h1><p>Base de datos terapéutica (FHIR MedicationKnowledge)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Medicamento (Referencia)</label><input type="text" id="code" placeholder="Medication/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="inactive">Inactivo</option></select></div>
  <div class="form-group"><label>Fabricante</label><input type="text" id="manufacturer" placeholder="Organization/example"></div>
  <div class="form-group full-width"><label>Indicaciones / Uso</label><textarea id="indication" placeholder="Detalles de uso clínico..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Conocimiento</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"MedicationKnowledge",status:document.getElementById('status').value,code:{text:document.getElementById('code').value},manufacturer:{reference:document.getElementById('manufacturer').value}};console.log("✅ MedicationKnowledge:",fhir);});</script></body></html>
