<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DeviceRequest - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-wheelchair"></i> Solicitud de Dispositivo</h1><p>Orden de equipos médicos (FHIR DeviceRequest)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="completed">Completado</option></select></div>
  <div class="form-group"><label>Dispositivo Solicitado</label><input type="text" id="device" placeholder="ej. Silla de ruedas" required></div>
  <div class="form-group"><label>Uso (Intención)</label><select id="intent"><option value="order">Orden</option><option value="proposal">Propuesta</option></select></div>
  <div class="form-group full-width"><label>Justificación</label><textarea id="reason" placeholder="Razón clínica del equipo..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Solicitud</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"DeviceRequest",status:document.getElementById('status').value,intent:document.getElementById('intent').value,code:{concept:{text:document.getElementById('device').value}},subject:{reference:document.getElementById('patient').value}};console.log("✅ DeviceRequest:",fhir);});</script></body></html>
