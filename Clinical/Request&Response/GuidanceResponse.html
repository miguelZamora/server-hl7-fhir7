<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GuidanceResponse - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-lightbulb"></i> Respuesta de Guía</h1><p>Resultado de soporte a decisiones (FHIR GuidanceResponse)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="success">Éxito</option><option value="failure">Fallo</option><option value="in-progress">En proceso</option></select></div>
  <div class="form-group"><label>Módulo / Protocolo</label><input type="text" id="module" placeholder="PlanDefinition/example"></div>
  <div class="form-group full-width"><label>Resultado / Recomendación</label><textarea id="result" placeholder="Descripción de la recomendación clínica..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Respuesta</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"GuidanceResponse",status:document.getElementById('status').value,subject:{reference:document.getElementById('patient').value},moduleUri:document.getElementById('module').value,note:[{text:document.getElementById('result').value}]};console.log("✅ GuidanceResponse:",fhir);});</script></body></html>
