<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CommunicationRequest - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-envelope-open-text"></i> Solicitud de Comunicación</h1><p>Orden de envío de mensajes (FHIR CommunicationRequest)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente / Sujeto</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activa</option><option value="draft">Borrador</option></select></div>
  <div class="form-group"><label>Prioridad</label><select id="priority"><option value="routine">Rutina</option><option value="urgent">Urgente</option></select></div>
  <div class="form-group"><label>Fecha Término</label><input type="datetime-local" id="occurrence"></div>
  <div class="form-group full-width"><label>Instrucción / Mensaje</label><textarea id="payload" placeholder="Texto que se debe comunicar..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Solicitud</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"CommunicationRequest",status:document.getElementById('status').value,subject:{reference:document.getElementById('patient').value},occurrenceDateTime:document.getElementById('occurrence').value,payload:[{contentString:document.getElementById('payload').value}]};console.log("✅ CommunicationRequest:",fhir);});</script></body></html>
