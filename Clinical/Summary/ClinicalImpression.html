<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ClinicalImpression - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-file-waveform"></i> Impresión Clínica</h1><p>Evaluación clínica del profesional (FHIR ClinicalImpression)</p></header>
<form action="#" method="POST" id="resourceForm">
<h2 class="section-title"><i class="fa-solid fa-brain"></i> Evaluación</h2>
<div class="grid-2">
  <div class="form-group"><label>Paciente / Sujeto</label><input type="text" id="subject" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Profesional Evaluador</label><input type="text" id="assessor" placeholder="Practitioner/example"></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="completed">Completada</option><option value="in-progress">En progreso</option><option value="entered-in-error">Error</option></select></div>
  <div class="form-group"><label>Fecha</label><input type="datetime-local" id="date"></div>
  <div class="form-group"><label>Encuentro Asociado</label><input type="text" id="encounter" placeholder="Encounter/example"></div>
  <div class="form-group"><label>Impresión Anterior</label><input type="text" id="previous" placeholder="ClinicalImpression/previous"></div>
  <div class="form-group full-width"><label>Descripción / Resumen</label><textarea id="description" rows="3" placeholder="Resumen clínico del estado del paciente..."></textarea></div>
  <div class="form-group full-width"><label>Diagnóstico de Trabajo</label><input type="text" id="workingDiagnosis" placeholder="ej. Sospecha de neuropatía diabética"></div>
  <div class="form-group full-width"><label>Plan / Pronóstico</label><textarea id="prognosisText" placeholder="Indicar plan terapéutico o pronóstico..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Impresión Clínica</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const btn=document.querySelector('.btn-submit');btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';btn.style.background='#10B981';const fhir={resourceType:"ClinicalImpression",id:"ci_"+Date.now().toString(36),status:document.getElementById('status').value,subject:{reference:document.getElementById('subject').value},encounter:{reference:document.getElementById('encounter').value},date:document.getElementById('date').value,assessor:{reference:document.getElementById('assessor').value},previous:{reference:document.getElementById('previous').value},description:document.getElementById('description').value,finding:[{item:{concept:{text:document.getElementById('workingDiagnosis').value}}}],prognosisCodeableConcept:[{text:document.getElementById('prognosisText').value}]};let db=JSON.parse(localStorage.getItem('fhir_impressions_db'))||[];db.push(fhir);localStorage.setItem('fhir_impressions_db',JSON.stringify(db));console.log("✅ ClinicalImpression:",fhir);setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-check"></i> ¡Guardado!';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-save"></i> Guardar Impresión Clínica';btn.style.background='var(--primary)';e.target.reset();},3000);},800);});
</script>
</body></html>
