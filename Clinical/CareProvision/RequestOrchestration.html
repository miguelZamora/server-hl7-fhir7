<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RequestOrchestration - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-diagram-project"></i> Orquestación de Solicitudes</h1><p>Gestión de flujos de trabajo (FHIR RequestOrchestration)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente / Sujeto</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="draft">Borrador</option></select></div>
  <div class="form-group"><label>Intención</label><select id="intent"><option value="plan">Plan</option><option value="order">Orden</option></select></div>
  <div class="form-group"><label>Título de la Acción</label><input type="text" id="actionTitle" placeholder="ej. Protocolo Quirúrgico"></div>
  <div class="form-group full-width"><label>Descripción de la Orquestación</label><textarea id="description" placeholder="Resumen de los pasos a seguir..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Orquestación</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"RequestOrchestration",status:document.getElementById('status').value,intent:document.getElementById('intent').value,subject:{reference:document.getElementById('patient').value},action:[{title:document.getElementById('actionTitle').value,description:document.getElementById('description').value}]};console.log("✅ RequestOrchestration:",fhir);});</script></body></html>
