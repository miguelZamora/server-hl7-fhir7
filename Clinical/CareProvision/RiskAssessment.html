<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RiskAssessment - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-triangle-exclamation"></i> Evaluación de Riesgo</h1><p>Predicción de eventos clínicos (FHIR RiskAssessment)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="final">Final</option><option value="preliminary">Preliminar</option></select></div>
  <div class="form-group"><label>Resultado Predicho</label><input type="text" id="outcome" placeholder="ej. Infarto" required></div>
  <div class="form-group"><label>Probabilidad (0-1)</label><input type="number" id="probability" step="0.01" placeholder="0.12"></div>
  <div class="form-group"><label>Riesgo Cualitativo</label><select id="qualitative"><option value="low">Bajo</option><option value="moderate">Moderado</option><option value="high">Alto</option></select></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Evaluación</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"RiskAssessment",status:document.getElementById('status').value,subject:{reference:document.getElementById('patient').value},prediction:[{outcome:{text:document.getElementById('outcome').value},probabilityDecimal:parseFloat(document.getElementById('probability').value),qualitativeRisk:{text:document.getElementById('qualitative').value}}]};console.log("✅ RiskAssessment:",fhir);});</script></body></html>
