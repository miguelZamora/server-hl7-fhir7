<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VisionPrescription - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-glasses"></i> Receta Oftalmológica</h1><p>Prescripción de lentes (FHIR VisionPrescription)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Paciente</label><input type="text" id="patient" placeholder="Patient/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activa</option><option value="cancelled">Cancelada</option></select></div>
  <h2 class="section-title full-width">Ojo Derecho (OD)</h2>
  <div class="form-group"><label>Esfera (Sph)</label><input type="number" id="odSphere" step="0.25" placeholder="-2.00"></div>
  <div class="form-group"><label>Cilindro (Cyl)</label><input type="number" id="odCylinder" step="0.25" placeholder="-0.50"></div>
  <div class="form-group"><label>Eje (Axis)</label><input type="number" id="odAxis" placeholder="180"></div>
  <h2 class="section-title full-width">Ojo Izquierdo (OI)</h2>
  <div class="form-group"><label>Esfera (Sph)</label><input type="number" id="oiSphere" step="0.25" placeholder="-2.00"></div>
  <div class="form-group"><label>Cilindro (Cyl)</label><input type="number" id="oiCylinder" step="0.25" placeholder="-0.50"></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Receta</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"VisionPrescription",status:document.getElementById('status').value,patient:{reference:document.getElementById('patient').value},lensSpecification:[{eye:"right",sphere:parseFloat(document.getElementById('odSphere').value)},{eye:"left",sphere:parseFloat(document.getElementById('oiSphere').value)}]};console.log("✅ VisionPrescription:",fhir);});</script></body></html>
