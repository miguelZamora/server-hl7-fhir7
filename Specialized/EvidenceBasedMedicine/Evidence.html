<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Evidence - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-microscope"></i> Evidencia Científica</h1><p>Datos de investigación basada en evidencia (FHIR Evidence)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/Evidence/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="draft">Borrador</option></select></div>
  <div class="form-group"><label>Título</label><input type="text" id="title" placeholder="Estudio sobre eficacia de..." required></div>
  <div class="form-group full-width"><label>Descripción / Hallazgo</label><textarea id="description" placeholder="Resumen de la evidencia encontrada..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Evidencia</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"Evidence",status:document.getElementById('status').value,url:document.getElementById('url').value,title:document.getElementById('title').value,description:document.getElementById('description').value};console.log("✅ Evidence:",fhir);});</script></body></html>
