<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ResearchStudy - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-microscope"></i> Estudio de Investigación</h1><p>Protocolos de investigación (FHIR ResearchStudy)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Título</label><input type="text" id="title" placeholder="Estudio clínico de fase III..." required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="completed">Completado</option><option value="suspended">Suspendido</option></select></div>
  <div class="form-group"><label>Patrocinador</label><input type="text" id="sponsor" placeholder="Organization/example"></div>
  <div class="form-group"><label>Principal Investigador</label><input type="text" id="principalInvestigator" placeholder="Practitioner/example"></div>
  <div class="form-group full-width"><label>Descripción / Fase</label><textarea id="description" placeholder="Resumen del estudio..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Estudio</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"ResearchStudy",status:document.getElementById('status').value,title:document.getElementById('title').value,sponsor:{reference:document.getElementById('sponsor').value},principalInvestigator:{reference:document.getElementById('principalInvestigator').value},description:document.getElementById('description').value};console.log("✅ ResearchStudy:",fhir);});</script></body></html>
