<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ResearchSubject - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-user-tag"></i> Sujeto de Investigación</h1><p>Persona participando en estudio (FHIR ResearchSubject)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>Estudio (Referencia)</label><input type="text" id="study" placeholder="ResearchStudy/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="candidate">Candidato</option><option value="enrolled">Inscrito</option><option value="withdrawn">Retirado</option></select></div>
  <div class="form-group"><label>Sujeto (Paciente)</label><input type="text" id="individual" placeholder="Patient/example" required></div>
  <div class="form-group"><label>ID en el Estudio</label><input type="text" id="identifier" placeholder="ej. SUBJ-001"></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Sujeto</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"ResearchSubject",status:document.getElementById('status').value,study:{reference:document.getElementById('study').value},individual:{reference:document.getElementById('individual').value},identifier:[{value:document.getElementById('identifier').value}]};console.log("✅ ResearchSubject:",fhir);});</script></body></html>
