<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Questionnaire - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-list-check"></i> Diseño de Cuestionario</h1><p>Definición de preguntas (FHIR Questionnaire)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/Questionnaire/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="draft">Borrador</option><option value="active">Activo</option><option value="retired">Retirado</option></select></div>
  <div class="form-group"><label>Título</label><input type="text" id="title" placeholder="Cuestionario de Salud General" required></div>
  <div class="form-group"><label>Versión</label><input type="text" id="version" placeholder="1.0.0"></div>
  <div class="form-group full-width"><label>Pregunta 1 (linkId | texto | tipo)</label><input type="text" id="q1" placeholder="q1 | ¿Cómo se siente hoy? | string"></div>
  <div class="form-group full-width"><label>Pregunta 2 (linkId | texto | tipo)</label><input type="text" id="q2" placeholder="q2 | ¿Ha tenido fiebre anteayer? | boolean"></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Cuestionario</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"Questionnaire",status:document.getElementById('status').value,url:document.getElementById('url').value,title:document.getElementById('title').value,version:document.getElementById('version').value,item:[]};['q1','q2'].forEach(id=>{const v=document.getElementById(id).value;if(v){const p=v.split('|');fhir.item.push({linkId:p[0].trim(),text:p[1].trim(),type:p[2]?.trim()||"string"});}});console.log("✅ Questionnaire:",fhir);});</script></body></html>
