<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ActivityDefinition - FHIR</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../css/fhir-style.css"></head>
<body>
<div class="form-container"><header class="form-header"><h1><i class="fa-solid fa-list-check"></i> Definición de Actividad</h1><p>Protocolo o procedimiento predefinido (FHIR ActivityDefinition)</p></header>
<form action="#" method="POST" id="resourceForm">
<div class="grid-2">
  <div class="form-group"><label>URL</label><input type="text" id="url" placeholder="http://hl7.org/fhir/ActivityDefinition/example" required></div>
  <div class="form-group"><label>Estado</label><select id="status"><option value="active">Activo</option><option value="draft">Borrador</option></select></div>
  <div class="form-group"><label>Título</label><input type="text" id="title" placeholder="Protocolo de Vacunación HP" required></div>
  <div class="form-group"><label>Tipo</label><select id="kind"><option value="ServiceRequest">Solicitud de Servicio</option><option value="MedicationRequest">Receta</option></select></div>
  <div class="form-group full-width"><label>Descripción</label><textarea id="description" placeholder="Resumen del protocolo..."></textarea></div>
</div>
<button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> Guardar Definición</button>
</form></div>
<script>document.getElementById('resourceForm').addEventListener('submit',function(e){e.preventDefault();const fhir={resourceType:"ActivityDefinition",status:document.getElementById('status').value,url:document.getElementById('url').value,title:document.getElementById('title').value,kind:document.getElementById('kind').value,description:document.getElementById('description').value};console.log("✅ ActivityDefinition:",fhir);});</script></body></html>
